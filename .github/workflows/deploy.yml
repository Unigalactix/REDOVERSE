name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Verify deploy token
        run: |
          if [ -z "${GH_PAGES_DEPLOY_TOKEN}" ]; then
            echo "Missing GH_PAGES_DEPLOY_TOKEN secret."
            echo "Create a Personal Access Token with repository write access and add it as GH_PAGES_DEPLOY_TOKEN in repository secrets."
            exit 1
          fi
        env:
          GH_PAGES_DEPLOY_TOKEN: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GIT_AUTH_TOKEN}@github.com/${{ github.repository }}.git
        env:
          GIT_AUTH_TOKEN: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}

      - name: Deploy to GitHub Pages
        run: npx gh-pages -d dist -b gh-pages -r https://x-access-token:${GIT_AUTH_TOKEN}@github.com/${{ github.repository }}.git
        env:
          GIT_AUTH_TOKEN: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
